name: Trigger auto deployment for yvan-servicenow-mcp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/yvan-servicenow-mcp-AutoDeployTrigger-f3b38d2a-5952-4680-a178-1da9d5eb3771.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.YVANSERVICENOWMCP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.YVANSERVICENOWMCP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.YVANSERVICENOWMCP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.YVANSERVICENOWMCP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.YVANSERVICENOWMCP_REGISTRY_PASSWORD }}
          containerAppName: yvan-servicenow-mcp
          resourceGroup: yvan-servicenow-mcp
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


