name: Trigger auto deployment for yvan-servicenow-mcp

on:
  push:
    branches: [ main ]
    paths:
      - '**'
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write 
      contents: read 

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4 # Updated to v4 for 2026 compatibility

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.YVANSERVICENOWMCP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.YVANSERVICENOWMCP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.YVANSERVICENOWMCP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          containerAppName: yvan-servicenow-mcp
          resourceGroup: yvan-servicenow-mcp
          # Use 'acrName' instead of registryUrl/Username/Password
          # This tells the action to use your Azure Login session
          acrName: yvanservicenowreg
          # Fix 2: Clean image name format
          imageToBuild: yvanservicenowreg.azurecr.io/yvan-servicenow-mcp:${{ github.sha }}
          # Fix 3: Solve the Port 80 vs 8080 mismatch
          targetPort: 8080
          dockerfilePath: Dockerfile
